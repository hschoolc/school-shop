        function resolveChecklistUrl(item) {
            const explicitUrl = item.url && item.url.trim() !== '' ? item.url.trim() : '';
            if (explicitUrl) {
                return explicitUrl;
            }

            // 根據清單項名稱關鍵字搜尋商品
            const normalizedItemName = (item.name || '').toLowerCase().replace(/\s+/g, '');
            
            // 嘗試完全或部分匹配
            const matchedProduct = products.find(product => {
                const productName = (product.name || '').toLowerCase().replace(/\s+/g, '');
                return productName.includes(normalizedItemName) || normalizedItemName.includes(productName);
            });

            if (matchedProduct && matchedProduct.affiliateUrl) {
                return matchedProduct.affiliateUrl;
            }

            // 沒有找到匹配的商品，返回空
            return '';
        }

        // 動態生成帶分類的租屋清單
        function buildChecklistHTML(mode = 'main') {
            const categories = {};
            rawChecklistData.forEach(item => {
                if (!categories[item.category]) {
                    categories[item.category] = [];
                }
                categories[item.category].push(item);
            });

            let html = '';
            Object.keys(categories).forEach((catName, catIndex) => {
                const isDrawer = mode === 'drawer';
                const containerClass = isDrawer ? 'space-y-1.5' : 'space-y-2';
                const headingClass = isDrawer
                    ? 'text-[11px] font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md inline-block mb-1'
                    : 'text-xs font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md inline-block mb-1';
                const itemClass = isDrawer
                    ? 'flex items-start justify-between p-2 rounded-xl bg-slate-50/70 border border-slate-100 hover:bg-slate-100/50 transition-all'
                    : 'flex items-start justify-between p-2 rounded-xl bg-slate-50/70 border border-slate-100 hover:bg-slate-100/50 transition-all';
                const labelClass = isDrawer
                    ? 'text-[11px] font-bold text-slate-700 block cursor-pointer select-none'
                    : 'text-xs font-bold text-slate-700 block cursor-pointer select-none';
                const noteClass = isDrawer
                    ? 'text-[10px] text-slate-400 font-normal leading-normal mt-0.5'
                    : 'text-[10px] text-slate-400 font-normal leading-normal mt-0.5';

                html += `
                    <div class="${containerClass}">
                        <h4 class="${headingClass}">📌 ${catName}</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                `;

                categories[catName].forEach((item, itemIndex) => {
                    const itemId = isDrawer ? `drawer_item_${catIndex}_${itemIndex}` : `rental_item_${catIndex}_${itemIndex}`;
                    const noteHTML = item.note ? `<p class="${noteClass}">${item.note}</p>` : '';
                    const targetUrl = resolveChecklistUrl(item);
                    const hasUrl = Boolean(targetUrl);
                    const escapedName = String(item.name).replace(/'/g, "\\'");
                    const escapedUrl = String(targetUrl).replace(/'/g, "\\'");
                    const btnHTML = hasUrl ? `
                        <div id="btn_container_${itemId}" class="flex-shrink-0 ml-2">
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" onclick="trackAndOpen('清單-${escapedName}', '${escapedUrl}')"
                                class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold text-[8px] sm:text-[9px] py-1 px-2.5 rounded-lg flex items-center gap-1 transition-colors shadow-sm whitespace-nowrap">
                                逛賣場 <i class="fa-solid fa-arrow-up-right-from-square text-[7px]"></i>
                            </a>
                        </div>
                    ` : '';

                    html += `
                        <div class="${itemClass}">
                            <div class="flex items-start gap-2.5 flex-1 min-w-0">
                                <input type="checkbox" id="${itemId}" onchange="handleCheckChange('${itemId}')"
                                    class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500 border-slate-300 cursor-pointer mt-0.5">
                                <div class="flex-1 min-w-0">
                                    <label id="label_${itemId}" for="${itemId}" class="${labelClass}">
                                        ${item.name}
                                    </label>
                                    ${noteHTML}
                                </div>
                            </div>
                            ${btnHTML}
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            return html;
        }

        // 處理打勾狀態變更
        function handleCheckChange(checkboxId) {
            const checkbox = document.getElementById(checkboxId);
            const label = document.getElementById(`label_${checkboxId}`);
            const btnContainer = document.getElementById(`btn_container_${checkboxId}`);

            if (checkbox.checked) {
                // 已勾選：標記刪除線，如果右邊有賣場按鈕則隱藏它
                label.classList.add('line-through', 'text-slate-400', 'font-normal');
                label.classList.remove('text-slate-700', 'font-bold');
                if (btnContainer) btnContainer.style.display = 'none';
            } else {
                // 未勾選：復原，重新顯示按鈕
                label.classList.remove('line-through', 'text-slate-400', 'font-normal');
                label.classList.add('text-slate-700', 'font-bold');
                if (btnContainer) btnContainer.style.display = 'block';
            }
        }

        // 核心邏輯：免運最優組合計算
        function calculateBestCombo() {
            const threshold = parseFloat(document.getElementById('shippingThreshold').value) || 0;
            const current = parseFloat(document.getElementById('currentCartAmount').value) || 0;
            const resultDiv = document.getElementById('calcResult');

            if (current <= 0) {
                resultDiv.innerHTML = `<p class="text-xs text-red-500 font-bold">請輸入正確的購物車金額唷！</p>`;
                return;
            }

            if (current >= threshold) {
                resultDiv.innerHTML = `
                    <div class="text-slate-800">
                        <p class="text-sm font-black text-green-600 mb-1">🎉 恭喜！您已達免運門檻！</p>
                        <p class="text-[11px] text-slate-500">目前金額 $${current} 已超過免運門檻 $${threshold}，免運券直接給它開下去！</p>
                    </div>
                `;
                return;
            }

            const deficit = threshold - current; 
            const addOnPool = products.filter(p => p.isAddOn === true || String(p.isAddOn).toUpperCase() === 'TRUE');

            if (addOnPool.length === 0) {
                resultDiv.innerHTML = `
                    <div class="text-left w-full">
                        <p class="text-xs text-slate-700 font-bold mb-1">還差 <span class="text-red-500 font-black text-sm">$${deficit}</span> 元免運！</p>
                        <p class="text-[10px] text-slate-400">目前後台尚未標記湊單品（isAddOn 欄位），快去點擊下方商品區尋找好物湊單吧！</p>
                    </div>
                `;
                return;
            }

            addOnPool.forEach(p => {
                const priceNum = parseFloat(String(p.price).replace(/[^0-9.]/g, '')) || 0;
                p._tempPrice = priceNum;
                p._score = priceNum >= deficit ? (priceNum - deficit) : (deficit - priceNum + 1000);
            });

            addOnPool.sort((a, b) => a._score - b._score);
            const bestMatch = addOnPool[0]; 
            const matchPrice = bestMatch._tempPrice;

            resultDiv.innerHTML = `
                <div class="text-left w-full space-y-2">
                    <p class="text-xs text-slate-700 font-bold">離免運還差 <span class="text-red-500 font-black text-sm">$${deficit}</span> 元！</p>
                    <div class="bg-white border border-slate-200 rounded-xl p-2 flex items-center gap-2 shadow-sm">
                        <img src="${bestMatch.image}" class="w-10 h-10 rounded-lg object-cover flex-shrink-0">
                        <div class="overflow-hidden flex-1">
                            <h4 class="text-[11px] font-bold text-slate-800 truncate">${bestMatch.name}</h4>
                            <p class="text-xs font-black text-orange-500 mt-0.5">${bestMatch.price}</p>
                        </div>
                    </div>
                    <p class="text-[10px] text-slate-400">💡 加上這款商品預估總計 $${current + matchPrice} 元，完美解鎖免運！</p>
                    <a href="${bestMatch.affiliateUrl}" target="_blank" rel="noopener noreferrer" class="w-full bg-orange-500 hover:bg-orange-600 text-white text-center font-bold text-[11px] py-2 px-3 rounded-lg flex items-center justify-center gap-1 transition-colors shadow-sm">
                        立即加購湊免運 <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
                    </a>
                </div>
            `;
        }

        // 計算日期差天數
        function getDaysDifference(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const today = new Date();
            const diffTime = Math.abs(today - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

                        <div class="p-3 pt-0">
                            <button onclick="trackAndOpen('${item.name.replace(/'/g, "\\'")}', '${item.affiliateUrl}')"
                                class="w-full bg-black hover:bg-slate-800 text-white text-center font-bold text-[11px] py-2 px-3 rounded-lg flex items-center justify-center gap-1 transition-colors">
                                查看賣場細節 <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // 分類點擊連動
        function filterCategory(category) {
            currentCategory = category;
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                if(btn.innerText.includes(category)) {
                    btn.className = category === '限時特賣' ? "cat-btn bg-red-500 text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors shadow-sm" : "cat-btn bg-black text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors border border-black shadow-sm";
                } else {
                    btn.className = btn.innerText.includes('限時特賣') ? "cat-btn bg-white hover:bg-slate-50 text-red-500 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border border-red-200 transition-colors shadow-sm" : "cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm";
                }
            });
            
            let filtered = (category === '全部') ? [...products] : products.filter(p => p.category === category);
            if (category === '全部') {
                filtered.sort((a, b) => (stats[b.name] || 0) - (stats[a.name] || 0));
            }

            displayStores(category);
            displayProducts(filtered);
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            filtered.sort((a, b) => (stats[b.name] || 0) - (stats[a.name] || 0));
            displayProducts(filtered);
        }

        function trackAndOpen(name, url) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'productClick', productName: name })
            }).catch(e => console.log("Track error", e));
            window.open(url, '_blank');
        }

        async function loadData() {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ type: 'pageView' })
            }).catch(e => console.log("PageView track error", e));

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const resJson = await response.json();
                products = resJson.products || [];
                stores = resJson.stores || [];
                stats = resJson.stats || {};
                rawChecklistData = resJson.checklist || defaultChecklistData;
                
                filterCategory('全部');
                
                // 產生租屋必備勾選清單
                generateRentalChecklist();

            } catch (error) {
                console.error("資料讀取失敗:", error);
                // 即使後台 API 失敗，使用預設清單
                rawChecklistData = defaultChecklistData;
                generateRentalChecklist();
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchProducts(); });
        loadData();
    </script>
</body>
</html>
