<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大學生集散地 | 蝦皮好物嚴選</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f9f9f9] text-[#101010] min-h-screen font-sans">

    <!-- 頂部導航欄 (仿 Threads 簡約黑白風) -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-200 overflow-hidden border border-slate-200 shadow-sm">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="h.school_c" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight">大學生集散地 <span class="text-xs font-normal text-slate-500">h.school_c</span></h1>
                    <p class="text-[11px] text-slate-400">為學生謀福利！上課/宿舍/穿搭好物推薦</p>
                </div>
            </div>
            <div class="flex gap-4 text-slate-700 text-lg">
                <i class="fa-brands fa-instagram cursor-pointer hover:text-black"></i>
                <i class="fa-solid fa-bars cursor-pointer hover:text-black"></i>
            </div>
        </div>
    </header>

    <!-- 搜尋與引流區 -->
    <section class="max-w-4xl mx-auto px-4 pt-8 pb-2">
        <div class="bg-white rounded-2xl border border-slate-200 p-2 shadow-sm flex items-center">
            <i class="fa-solid fa-magnifying-glass text-slate-400 ml-3 mr-2 text-sm"></i>
            <input id="searchInput" type="text" placeholder="搜尋穿搭、宿舍神物、3C 商品..." 
                   class="w-full bg-transparent text-slate-800 focus:outline-none text-sm py-1.5">
            <button onclick="searchProducts()" class="bg-black hover:bg-slate-800 text-white rounded-xl px-5 py-1.5 text-xs font-medium transition-colors whitespace-nowrap">
                搜尋好物
            </button>
        </div>
    </section>

    <!-- 全分類標籤列 -->
    <nav class="max-w-4xl mx-auto px-4 py-3 overflow-x-auto flex gap-2 no-scrollbar">
        <button onclick="filterCategory('全部')" class="cat-btn bg-black text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors border border-black shadow-sm">全部好物</button>
        <button onclick="filterCategory('限時特賣')" class="cat-btn bg-white hover:bg-slate-50 text-red-500 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border border-red-200 transition-colors shadow-sm">🔥 限時特賣</button>
        <button onclick="filterCategory('女生穿搭')" class="cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm">女生穿搭</button>
        <button onclick="filterCategory('男生穿搭')" class="cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm">男生穿搭</button>
        <button onclick="filterCategory('上課必備')" class="cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm">上課必備</button>
        <button onclick="filterCategory('宿舍神物')" class="cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm">宿舍神物</button>
        <button onclick="filterCategory('高CP值3C')" class="cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm">高CP值3C</button>
    </nav>

    <!-- 商品卡片區 -->
    <main class="max-w-4xl mx-auto px-4 pb-24 pt-2">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- 資料會由下方 Google 試算表或測試資料注入 -->
        </div>
    </main>

    <footer class="text-center py-8 text-[11px] text-slate-400 border-t border-slate-100 bg-white mt-12">
        <p>© 2026 大學生集散地 h.school_c · 保留所有權利</p>
    </footer>

    <script>
        // 這是預留的測試資料，方便你本機查看（串接試算表後會自動被雲端資料取代）
        const testProducts = [
            {
                name: "美式復古 V 領寬鬆針織毛衣",
                category: "女生穿搭",
                image: "https://images.unsplash.com/photo-1614975058789-41316d0e2e9c?auto=format&fit=crop&w=400&q=80",
                affiliateUrl: "https://shope.ee/your_link", 
                price: "$390",
                rating: "4.9 ★",
                sales: "已售 4.2k"
            },
            {
                name: "微風質感香氛融蠟燈 (安全款)",
                category: "宿舍神物",
                image: "https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&w=400&q=80",
                affiliateUrl: "https://shope.ee/your_link",
                price: "$499",
                rating: "5.0 ★",
                sales: "已售 800+"
            }
        ];

        // 串接 Google 試算表的設定 (記得換成你的應用程式 URL)
        const GOOGLE_SCRIPT_URL = "你的GOOGLE_SCRIPT_網頁應用程式URL";
        let products = [];

        function displayProducts(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            if(data.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs">找不到相關好物，換個關鍵字試試看吧！</div>`;
                return;
            }

            data.forEach(item => {
                const isSale = item.category === '限時特賣';
                const tagClass = isSale ? 'bg-red-500 text-white' : 'bg-black/70 text-white';

                const card = `
                    <div class="bg-white rounded-xl border border-slate-100 overflow-hidden flex flex-col justify-between shadow-sm hover:shadow-md transition-all">
                        <div>
                            <!-- 商品圖片 -->
                            <div class="relative aspect-square overflow-hidden bg-slate-50">
                                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                                <span class="absolute top-2 left-2 backdrop-blur-sm text-[9px] font-bold px-2 py-0.5 rounded-md ${tagClass}">${item.category}</span>
                            </div>
                            <!-- 內容描述 -->
                            <div class="p-3">
                                <h3 class="font-bold text-slate-900 text-xs md:text-sm line-clamp-2 mb-2 leading-snug h-8 md:h-10">${item.name}</h3>
                                
                                <!-- 星星評分與銷量列 -->
                                <div class="flex items-center justify-between text-[11px] text-slate-500 mb-2">
                                    <span class="text-amber-500 font-bold flex items-center gap-0.5">
                                        <i class="fa-solid fa-star text-[10px]"></i> ${item.rating || '4.9 ★'}
                                    </span>
                                    <span class="text-slate-400">${item.sales || '已售出'}</span>
                                </div>

                                <!-- 價格 -->
                                <div class="text-sm font-black text-black">
                                    ${item.price}
                                </div>
                            </div>
                        </div>
                        <div class="p-3 pt-0">
                            <a href="${item.affiliateUrl}" target="_blank" class="w-full bg-black hover:bg-slate-800 text-white text-center font-bold text-[11px] py-2 px-3 rounded-lg flex items-center justify-center gap-1 transition-colors">
                                查看賣場細節 <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
                            </a>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterCategory(category) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                if(btn.innerText.includes(category)) {
                    if (category === '限時特賣') {
                        btn.className = "cat-btn bg-red-500 text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-colors shadow-sm";
                    } else {
                        btn.className = "cat-btn bg-black text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors border border-black shadow-sm";
                    }
                } else {
                    if (btn.innerText.includes('限時特賣')) {
                        btn.className = "cat-btn bg-white hover:bg-slate-50 text-red-500 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border border-red-200 transition-colors shadow-sm";
                    } else {
                        btn.className = "cat-btn bg-white hover:bg-slate-50 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border border-slate-200 transition-colors shadow-sm";
                    }
                }
            });

            if (category === '全部') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                displayProducts(filtered);
            }
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query));
            displayProducts(filtered);
        }

        // 動態抓取資料
        async function loadProductsFromGoogle() {
            const grid = document.getElementById('productGrid');
            if(GOOGLE_SCRIPT_URL === "你的GOOGLE_SCRIPT_網頁應用程式URL") {
                // 如果還沒填網址，先顯示測試資料方便看畫面
                products = testProducts;
                displayProducts(products);
                return;
            }
            
            grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs flex flex-col items-center gap-2"><i class="fa-solid fa-spinner fa-spin text-lg text-black"></i> 好物載入中...</div>`;
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error(error);
                products = testProducts; // 失敗時退回測試資料
                displayProducts(products);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchProducts();
        });

        loadProductsFromGoogle();
    </script>
</body>
</html>
